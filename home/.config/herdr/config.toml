# Managed from ~/.dev_environment/home/.config/herdr/config.toml

onboarding = false

[update]
channel = "stable"
version_check = true
manifest_check = true

[terminal]
default_shell = "zsh"
shell_mode = "non_login"
new_cwd = "follow"

[keys]
prefix = "ctrl+space"

split_vertical = "prefix+v"
split_horizontal = "prefix+h"
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

new_tab = "prefix+n"
previous_tab = "alt+j"
next_tab = "alt+k"
rename_tab = "prefix+r"
resize_mode = "prefix+shift+e"
copy_mode = "prefix+["

[theme]
name = "gruvbox"

[ui.sound]
enabled = false
