# Managed from ~/.dev_environment/home/.config/tmux/tmux.conf

unbind C-b
set -g prefix C-Space

set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',xterm-ghostty:RGB'

unbind R
bind R source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Write to all panes
unbind C-S
bind C-Y set-window-option synchronize-panes

unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Shared with Herdr: prefix+Shift+E enters a short h/j/k/l resize mode.
bind E switch-client -T resize
bind -r -T resize h resize-pane -L 5
bind -r -T resize j resize-pane -D 2
bind -r -T resize k resize-pane -U 2
bind -r -T resize l resize-pane -R 5

set -g history-limit 100000
set -g status-position top
set -g status-justify centre

unbind n
unbind r
bind r command-prompt "rename-window '%%'"
bind n new-window -c "#{pane_current_path}"

set -g base-index 1
set-window-option -g pane-base-index 1

bind -n M-j previous-window
bind -n M-k next-window

set -g mode-keys vi
set -g set-clipboard on
set -s escape-time 0

unbind -T copy-mode-vi Space
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "sh -c 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -in -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "sh -c 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -in -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'"

# Pinned by flake inputs and linked into these familiar TPM paths.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_status_left_separator ''
set -g @catppuccin_status_middle_separator ''
set -g @catppuccin_status_right_separator ' '
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_cpu_icon 'CPU '
set -g @catppuccin_ram_icon 'MEM '

run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

set -g status-left ''
set -g status-right-length 100
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"

run '~/.tmux/plugins/tpm/tpm'
